<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you — SnapBar Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --paper:#f2eee3; --ink:#1a1713; --graphite:#6b6558; --verm:#e14e1d; --hairline:rgba(26,23,19,.22); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--paper); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif; min-height:100vh; display:grid; place-items:center; padding:24px; }
  .card { max-width:520px; width:100%; border:1.5px solid var(--ink); border-radius:3px; background:#f7f4ec; box-shadow:5px 5px 0 var(--ink); padding:38px 36px; text-align:center; }
  h1 { font-family:"Fraunces",serif; font-weight:600; font-size:30px; margin:14px 0 8px; }
  h1 em { font-style:italic; color:var(--verm); }
  p { color:var(--graphite); font-size:14.5px; line-height:1.6; }
  .key {
    margin:24px auto 8px; padding:16px 18px; border:1.5px dashed var(--verm); border-radius:3px;
    font-family:"IBM Plex Mono",monospace; font-size:19px; font-weight:600; letter-spacing:.08em;
    background:#fffdf7; user-select:all; min-height:56px; display:flex; align-items:center; justify-content:center;
  }
  .btn { display:inline-block; margin-top:14px; padding:11px 22px; border:1.5px solid var(--ink); border-radius:2px; background:var(--ink); color:var(--paper); font-family:"IBM Plex Mono",monospace; font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; text-decoration:none; box-shadow:3px 3px 0 rgba(26,23,19,.35); cursor:pointer; }
  .steps { text-align:left; margin-top:26px; font-size:13.5px; color:var(--graphite); }
  .steps li { margin:6px 0 6px 18px; }
  .mono-small { font-family:"IBM Plex Mono",monospace; font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--graphite); margin-top:20px; }
</style>
</head>
<body>
<div class="card">
  <svg width="40" height="40" viewBox="0 0 42 42" style="color:var(--ink)">
    <g fill="none" stroke="currentColor" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 15 V9 a3 3 0 0 1 3-3 H15"/><path d="M27 6 H33 a3 3 0 0 1 3 3 V15"/>
      <path d="M36 27 V33 a3 3 0 0 1-3 3 H27"/><path d="M15 36 H9 a3 3 0 0 1-3-3 V27"/>
    </g>
    <circle cx="21" cy="21" r="4.6" fill="#e14e1d"/>
  </svg>
  <h1>You got the <em>keeper.</em></h1>
  <p id="sub">Fetching your license key…</p>
  <div class="key" id="key">· · ·</div>
  <button class="btn" id="copy" style="display:none">Copy key</button>
  <ol class="steps">
    <li>Open SnapBar from your menu bar</li>
    <li>Right-click the icon → <b>SnapBar Pro…</b></li>
    <li>Paste your key and hit <b>Activate</b></li>
  </ol>
  <p class="mono-small">Keep this page or the Stripe receipt — the key is shown here any time you reopen this link.</p>
</div>
<script>
  // Set after deploying store/worker.js (see store/README.md).
  const WORKER_URL = "";

  const sessionId = new URLSearchParams(location.search).get("session_id");
  const keyEl = document.getElementById("key");
  const subEl = document.getElementById("sub");
  const copyBtn = document.getElementById("copy");

  async function load() {
    if (!WORKER_URL || !sessionId) {
      subEl.textContent = "Your license key arrives by email shortly after purchase.";
      keyEl.textContent = "SNAP-#####-#####-#####";
      return;
    }
    try {
      const r = await fetch(`${WORKER_URL}/redeem?session_id=${encodeURIComponent(sessionId)}`);
      const d = await r.json();
      if (d.key) {
        subEl.textContent = "Here's your license key — paste it into SnapBar:";
        keyEl.textContent = d.key;
        copyBtn.style.display = "inline-block";
        copyBtn.onclick = () => { navigator.clipboard.writeText(d.key); copyBtn.textContent = "Copied ✓"; };
      } else {
        subEl.textContent = "We couldn't verify this purchase — reply to your Stripe receipt and a human will sort it out.";
      }
    } catch {
      subEl.textContent = "Network hiccup — refresh this page in a moment.";
    }
  }
  load();
</script>
</body>
</html>
